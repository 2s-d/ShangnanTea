server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    max-swallow-size: 50MB  # Tomcat层面的最大请求大小（必须 >= Spring Boot的max-request-size）

spring:
  profiles:
    active: local  # 默认使用 local 配置（本地开发）2
  main:
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB  # 单个文件最大大小（图片通常较大，设置为20MB）
      max-request-size: 50MB  # 整个请求最大大小（支持多文件上传）
      file-size-threshold: 2KB  # 文件写入磁盘的阈值，小于此值保存在内存中
      location: ${java.io.tmpdir}  # 临时文件存储位置
  datasource:
    url: jdbc:mysql://localhost:3306/teasystem.sql?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:your-db-password}  # 使用环境变量
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  redis:
    host: localhost
    port: 6379
    timeout: 3000ms
    database: 0
  mail:
    host: smtp.qq.com
    port: 587
    username: ${MAIL_USERNAME:your-email@qq.com}  # 使用环境变量
    password: ${MAIL_PASSWORD:your-mail-auth-code}  # 使用环境变量
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# 阿里云短信认证服务配置
aliyun:
  sms:
    enabled: ${ALIYUN_SMS_ENABLED:false}  # 是否启用真实短信发送（true=真实发送，false=模拟发送）
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-aliyun-access-key-id}  # 使用环境变量
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-aliyun-access-key-secret}  # 使用环境变量
    sign-name: ${ALIYUN_SIGN_NAME:商南茶城}  # 短信签名
    template-code: ${ALIYUN_TEMPLATE_CODE:}  # 短信模板代码

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.shangnantea.model.entity.user
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.shangnantea: debug
  pattern:
    # 控制台日志输出格式，带上 requestId 便于从 APIFox 的 X-Request-Id 反查对应日志
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId:%X{requestId}] - %msg%n"
    # 文件日志输出格式，同样带上 requestId，方便脚本和人工筛选
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [requestId:%X{requestId}] - %msg%n"
  file:
    # 后端日志落盘位置（与现有 shangnantea-server.log 保持一致）
    name: logs/shangnantea-server.log

# JWT配置（模板环境不直接写死密钥，实际密钥从本地配置或环境变量注入）
jwt:
  secret: ${JWT_SECRET:}  # 占位符，实际值由 application-local.yml 或运行环境提供
  expiration: 86400000 

# 应用配置
app:
  # 注意：后端应用配置了 context-path: /api
  # 因此前端访问静态资源和接口时，真实前缀应为 http://localhost:8080/api
  # 这里用于生成文件访问 URL（/api/files/**），否则会出现 404
  base-url: http://localhost:8080/api

# 支付宝配置（沙箱环境）
alipay:
  # 应用ID
  app-id: ${ALIPAY_APP_ID:your-alipay-app-id}  # 使用环境变量
  # 应用私钥
  private-key: ${ALIPAY_PRIVATE_KEY:your-alipay-private-key}  # 使用环境变量
  # 支付宝公钥
  public-key: ${ALIPAY_PUBLIC_KEY:your-alipay-public-key}  # 使用环境变量
  # 支付宝网关地址（沙箱环境）
  gateway-url: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  # 签名类型
  sign-type: RSA2
  # 字符编码
  charset: UTF-8
  # 返回格式
  format: json
  # 同步回调地址（前端支付结果页面）
  return-url: https://tea.paku.uno/order/payment
  # 异步回调地址（后端接口 - 需要公网地址）
  notify-url: https://tea.paku.uno/api/order/alipay/notify
  # 支付有效期（支付宝收银台倒计时），建议与业务支付单超时保持一致
  timeout-express: 15m

# 订单/支付单业务规则
order:
  # 支付单创建后未支付的超时时长（分钟），到期自动关闭支付单并取消关联订单
  payment-timeout-minutes: 15

# 高德天气配置（Web服务 API）
gaode:
  weather:
    # 是否启用真实天气查询（true=调用高德天气API，false=后端可走Mock数据）
    enabled: ${GAODE_WEATHER_ENABLED:true}
    # 高德开放平台 Web服务 Key（不要提交真实值到仓库，使用环境变量覆盖）
    key: ${GAODE_WEATHER_KEY:your-gaode-weather-key}
    # 高德天气查询基础URL
    base-url: https://restapi.amap.com/v3/weather/weatherInfo
    # 默认城市adcode（可用环境变量或本地配置覆盖，例如：611023=商南县）
    default-city: ${GAODE_WEATHER_DEFAULT_CITY:610000}
    # 单个城市天气缓存时间（分钟），用于控制调用频率和配额消耗
    cache-minutes: ${GAODE_WEATHER_CACHE_MINUTES:30}
